<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Gran Purria Porra · Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --campo:#14532d; --campo-osc:#0c3b1f;
  --cal:#f4f7f1; --tinta:#13202f; --gris:#5d6b7a;
  --linea:#d8e0d6; --oro:#f5b82e;
  --exacto:#1d9e55; --signo:#e2a812; --radio:10px;
  font-size:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cal);color:var(--tinta);-webkit-font-smoothing:antialiased}

header{background:var(--campo);background-image:repeating-linear-gradient(90deg, rgba(255,255,255,.045) 0 90px, transparent 90px 180px);color:#fff;padding:2.2rem 1.2rem 5.2rem;text-align:center;position:relative}
header .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.32em;color:rgba(255,255,255,.65);text-transform:uppercase;margin-bottom:.55rem}
header .firma{position:absolute;top:.9rem;left:1rem;font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.04em;color:rgba(255,255,255,.55);text-align:left;line-height:1.3;text-transform:none}
header .firma b{color:rgba(255,255,255,.8);font-weight:700}
@media (max-width:680px){header .firma{font-size:.55rem}}
header h1{font-family:'Archivo Black',sans-serif;font-size:clamp(1.5rem,4.5vw,2.7rem);line-height:1.05;text-transform:uppercase}
header h1 span{color:var(--oro)}
header::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:rgba(255,255,255,.5)}
header .circulo{position:absolute;left:50%;bottom:-29px;transform:translateX(-50%);width:58px;height:58px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:var(--campo);display:flex;align-items:center;justify-content:center;font-size:1.5rem}

.marcador{max-width:880px;margin:-2.2rem auto 0;padding:0 1rem;position:relative;z-index:2}
.marcador-panel{background:var(--campo-osc);border-radius:var(--radio);padding:1.5rem 1.2rem 1.1rem;box-shadow:0 14px 34px -16px rgba(12,59,31,.55);display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem}
.marcador-panel .titulo{grid-column:1/-1;font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.5);text-align:center;margin-bottom:.2rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
.punto{width:.5rem;height:.5rem;border-radius:50%;background:#e0533a;transition:background .3s}
.punto.online{background:#34d17a;box-shadow:0 0 0 3px rgba(52,209,122,.2)}
.jugador{text-align:center;color:#fff;border-radius:8px;padding:.7rem .3rem .8rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
.jugador.lider{background:rgba(245,184,46,.12);border-color:var(--oro)}
.jugador .nombre{font-weight:600;font-size:.85rem;margin-bottom:.2rem}
.jugador .pts{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:2rem;line-height:1;color:var(--oro);font-variant-numeric:tabular-nums}
.jugador .etiqueta{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:.3rem}
.jugador.lider .etiqueta{color:var(--oro)}

.barra{max-width:880px;margin:1rem auto 0;padding:0 1rem;display:flex;justify-content:flex-end}
.barra button{cursor:pointer;font:inherit;font-size:.78rem;font-weight:600;border:1px solid var(--campo);border-radius:999px;background:#fff;color:var(--campo);padding:.45rem 1rem;display:inline-flex;align-items:center;gap:.4rem;transition:all .15s ease}
.barra button:hover{background:var(--campo);color:#fff}

nav{position:sticky;top:0;z-index:5;background:var(--cal);border-bottom:1px solid var(--linea);padding:.7rem 1rem;display:flex;gap:.45rem;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{flex:0 0 auto;cursor:pointer;font:inherit;font-size:.8rem;font-weight:600;border:1px solid var(--linea);border-radius:999px;background:#fff;color:var(--gris);padding:.42rem .95rem;transition:all .15s ease}
nav button:hover{border-color:var(--campo);color:var(--campo)}
nav button.activo{background:var(--campo);border-color:var(--campo);color:#fff}
nav button:focus-visible{outline:2px solid var(--oro);outline-offset:2px}

main{max-width:880px;margin:0 auto;padding:1.6rem 1rem 4rem}
section{margin-bottom:2.6rem}
.cabecera-seccion{display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem}
.cabecera-seccion h2{font-family:'Archivo Black',sans-serif;font-size:1.05rem;text-transform:uppercase;letter-spacing:.04em;color:var(--campo);white-space:nowrap}
.cabecera-seccion::after{content:"";flex:1;height:2px;background:var(--linea)}

.encabezados{position:sticky;top:var(--nav-h,3.1rem);z-index:4;display:grid;grid-template-columns:5.2rem 1fr repeat(5,4.4rem);gap:.45rem;align-items:end;padding:.5rem .6rem .35rem;background:var(--cal);border-bottom:1px solid var(--linea);font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gris)}
.encabezados div:nth-child(n+3){text-align:center}
.encabezados .res{color:var(--campo);font-weight:700}

.partido{display:grid;grid-template-columns:5.2rem 1fr repeat(5,4.4rem);gap:.45rem;align-items:center;background:#fff;border:1px solid var(--linea);border-radius:var(--radio);padding:.55rem .6rem;margin-bottom:.45rem}
.partido .fecha{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--gris);line-height:1.3}
.partido .equipos{font-weight:600;font-size:.88rem;line-height:1.25}

.celda input{width:100%;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:.82rem;font-weight:500;border:1.5px solid var(--linea);border-radius:7px;padding:.42rem .15rem;background:var(--cal);color:var(--tinta);transition:border-color .15s ease, box-shadow .15s ease}
.celda input::placeholder{color:#b9c4bd}
.celda input:focus{outline:none;border-color:var(--campo);background:#fff;box-shadow:0 0 0 3px rgba(20,83,45,.12)}
.celda.resultado input{border-color:var(--campo);background:#fff;font-weight:700}
.celda input.exacto{border-color:var(--exacto);background:#e8f7ee;color:#0e6b38}
.celda input.signo{border-color:var(--signo);background:#fdf4dd;color:#8a6508}
.celda input.fallo{color:#9aa7a0;background:#f1f4f0}
.celda input.error{border-color:#d23c3c;background:#fdeaea}
.celda input.flash{animation:flash .6s ease}
@keyframes flash{0%{background:#fff7da}100%{}}

.leyenda{display:flex;gap:1.2rem;flex-wrap:wrap;justify-content:center;font-size:.72rem;color:var(--gris);margin-top:2rem;padding-bottom:2rem}
.leyenda span::before{content:"";display:inline-block;width:.7rem;height:.7rem;border-radius:3px;margin-right:.35rem;vertical-align:-1px}
.leyenda .l-exacto::before{background:#1d9e55}
.leyenda .l-signo::before{background:#e2a812}
.leyenda .l-fallo::before{background:#c8d2cb}

#toast{position:fixed;bottom:1.2rem;left:50%;transform:translate(-50%,1rem);background:var(--tinta);color:#fff;font-size:.8rem;font-weight:500;padding:.6rem 1.1rem;border-radius:999px;opacity:0;pointer-events:none;transition:all .25s ease;z-index:20;max-width:90vw;text-align:center}
#toast.visible{opacity:1;transform:translate(-50%,0)}
#toast.err{background:#b32626}

.aviso-config{max-width:880px;margin:1.5rem auto;padding:1rem 1.2rem;background:#fff7e0;border:1px solid var(--oro);border-radius:var(--radio);color:#7a5b00;font-size:.85rem;line-height:1.5}
.aviso-config code{background:#fff;padding:.1rem .35rem;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:.8rem}

@media (max-width:680px){
  .encabezados{display:none}
  .partido{grid-template-columns:repeat(5,1fr);row-gap:.5rem}
  .partido .fecha{grid-column:1/3}
  .partido .equipos{grid-column:3/6;text-align:right}
  .celda{position:relative;padding-top:.9rem}
  .celda::before{content:attr(data-nombre);position:absolute;top:0;left:0;right:0;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;color:var(--gris)}
  .celda.resultado::before{color:var(--campo);font-weight:700}
}
@media (prefers-reduced-motion: reduce){*{transition:none !important;animation:none !important}}
</style>
</head>

let JUGADORES = SEED.jugadores;
let datos = null;          // estado actual {secciones:[...]}
let db = null, refPorra = null;

const $ = s => document.querySelector(s);
const toast = (msg, esError=false) => {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'visible' + (esError ? ' err' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = '', 2400);
};
const estado = (txt, online) => {
  $('#estado').textContent = txt;
  $('#punto').classList.toggle('online', !!online);
};

/* ---------- puntuación ---------- */
function parsear(s){
  const m = /^\s*(\d{1,2})\s*-\s*(\d{1,2})\s*$/.exec(s || '');
  return m ? [+m[1], +m[2]] : null;
}
function normaliza(s){ const m = parsear(s); return m ? `${m[0]} - ${m[1]}` : ''; }
function puntos(pron, res){
  const p = parsear(pron), r = parsear(res);
  if (!p || !r) return null;
  if (p[0]===r[0] && p[1]===r[1]) return 3;
  const sg = x => Math.sign(x[0]-x[1]);
  return sg(p)===sg(r) ? 1 : 0;
}
function totales(){
  const t = [0,0,0,0];
  datos.secciones.forEach(s => s.partidos.forEach(p => {
    p.pron.forEach((pr,i) => { const pt = puntos(pr, p.res); if (pt) t[i]+=pt; });
  }));
  return t;
}

/* ---------- render ---------- */
function claseAcierto(pt){ return pt===3?'exacto':pt===1?'signo':pt===0?'fallo':''; }

function pintarMarcador(){
  const panel = $('#marcador');
  panel.querySelectorAll('.jugador').forEach(e => e.remove());
  const t = totales();
  const max = Math.max(...t);
  JUGADORES.forEach((nombre,i) => {
    const div = document.createElement('div');
    const lider = t[i]===max && max>0;
    div.className = 'jugador' + (lider?' lider':'');
    div.innerHTML = `<div class="nombre">${nombre}</div><div class="pts">${t[i]}</div>
      <div class="etiqueta">${lider?'★ líder':'puntos'}</div>`;
    panel.appendChild(div);
  });
}

function pintarTodo(){
  const nav = $('#nav'), main = $('#contenido');
  nav.innerHTML = ''; main.innerHTML = '';
  datos.secciones.forEach((sec,idx) => {
    const id = 'sec-'+idx;
    const btn = document.createElement('button');
    btn.textContent = sec.nombre;
    btn.onclick = () => {
      $('#'+id).scrollIntoView({behavior:'smooth',block:'start'});
      nav.querySelectorAll('button').forEach(b=>b.classList.remove('activo'));
      btn.classList.add('activo');
    };
    if (idx===0) btn.classList.add('activo');
    nav.appendChild(btn);

    const section = document.createElement('section');
    section.id = id; section.style.scrollMarginTop = '4rem';
    section.innerHTML = `<div class="cabecera-seccion"><h2>${sec.nombre}</h2></div>
      <div class="encabezados"><div>Fecha</div><div>Partido</div>
      ${JUGADORES.map(j=>`<div>${j}</div>`).join('')}<div class="res">Result.</div></div>`;

    sec.partidos.forEach(p => {
      const fila = document.createElement('div');
      fila.className = 'partido';
      fila.innerHTML = `
        <div class="fecha">${p.fecha||''}</div>
        <div class="equipos">${p.partido}</div>
        ${JUGADORES.map((j,i)=>`<div class="celda" data-nombre="${j}">
          <input value="${p.pron[i]||''}" placeholder="–" class="${claseAcierto(puntos(p.pron[i],p.res))}"
            data-id="${p.id}" data-campo="${i}" inputmode="numeric"
            aria-label="Pronóstico de ${j} para ${p.partido}"></div>`).join('')}
        <div class="celda resultado" data-nombre="Result.">
          <input value="${p.res||''}" placeholder="–" data-id="${p.id}" data-campo="res"
            inputmode="numeric" aria-label="Resultado de ${p.partido}"></div>`;
      section.appendChild(fila);
    });
    main.appendChild(section);
  });
  enlazarInputs();
  ajustarAlturaNav();
}

/* Coloca la cabecera de columnas justo debajo de la barra de fases,
   midiendo su altura real (se adapta a la pantalla y a la fuente). */
function ajustarAlturaNav(){
  const nav = $('#nav');
  if (!nav) return;
  const h = nav.getBoundingClientRect().height;
  document.documentElement.style.setProperty('--nav-h', h + 'px');
}
window.addEventListener('resize', ajustarAlturaNav);

function enlazarInputs(){
  document.querySelectorAll('#contenido input').forEach(inp => {
    inp.dataset.original = inp.value;
    inp.addEventListener('input', () => mascara(inp));
    inp.addEventListener('blur', () => guardar(inp));
    inp.addEventListener('keydown', e => { if (e.key==='Enter') inp.blur(); });
  });
}

/* Máscara de marcador: escribes los dígitos y el guión se pone solo.
   "2" -> "2 - "   ·   "21" -> "2 - 1"   ·   "00" -> "0 - 0"
   Asume un dígito por equipo (0-9), que cubre cualquier marcador realista.
   Al borrar no fuerza el guión, para poder corregir con normalidad. */
function mascara(inp){
  const borrando = (inp.value.length < (inp._prev?.length ?? 0));
  const digitos = inp.value.replace(/\D/g, '').slice(0, 2);

  if (digitos === ''){
    inp.value = '';
  } else if (digitos.length === 1){
    inp.value = borrando ? digitos : digitos + ' - ';
  } else {
    inp.value = digitos[0] + ' - ' + digitos[1];
  }
  inp._prev = inp.value;
}

function buscarPartido(id){
  for (const s of datos.secciones){ const p = s.partidos.find(p=>p.id===id); if (p) return p; }
  return null;
}

/* Refresca valores/colores sin reconstruir el DOM (no roba el foco) */
function refrescar(){
  document.querySelectorAll('#contenido input').forEach(inp => {
    const p = buscarPartido(inp.dataset.id); if (!p) return;
    const campo = inp.dataset.campo;
    const valor = campo==='res' ? (p.res||'') : (p.pron[+campo]||'');
    if (document.activeElement !== inp && inp.value !== valor){
      inp.value = valor;
      inp.classList.add('flash');
      setTimeout(()=>inp.classList.remove('flash'),600);
    }
    inp.dataset.original = valor;
    if (campo!=='res') inp.className = claseAcierto(puntos(p.pron[+campo], p.res));
  });
  pintarMarcador();
}

/* ---------- guardado en Firebase ---------- */
async function guardar(inp){
  const valor = inp.value.trim();
  if (valor === inp.dataset.original.trim()) return;
  inp.classList.remove('error');
  if (valor && !parsear(valor)){
    inp.classList.add('error');
    toast('Formato no válido. Usa por ejemplo: 2 - 1', true);
    return;
  }
  const limpio = normaliza(valor);
  inp.value = limpio;
  const p = buscarPartido(inp.dataset.id); if (!p) return;
  const campo = inp.dataset.campo;
  if (campo==='res') p.res = limpio; else p.pron[+campo] = limpio;
  inp.dataset.original = limpio;
  if (campo!=='res') inp.className = claseAcierto(puntos(p.pron[+campo], p.res));
  pintarMarcador();

  if (!refPorra){ toast('Modo local: configura Firebase para guardar online', true); return; }
  try{
    await set(refPorra, datos);
    toast('Guardado ✓');
  }catch(e){
    inp.classList.add('error');
    toast('No se pudo guardar online: ' + e.message, true);
  }
}

/* ---------- descarga de Excel ---------- */
function descargarExcel(){
  const cab = ['Fecha','Partido',...JUGADORES,'Resultado'];
  const aoa = [];
  const puntosAoa = [['', ...JUGADORES]];
  const acum = [0,0,0,0];
  datos.secciones.forEach(sec => {
    aoa.push([sec.nombre]);
    aoa.push(cab);
    const sub = [0,0,0,0];
    sec.partidos.forEach(p => {
      aoa.push([p.fecha, p.partido, ...p.pron, p.res]);
      p.pron.forEach((pr,i)=>{ const pt=puntos(pr,p.res); if(pt){sub[i]+=pt;acum[i]+=pt;} });
    });
    aoa.push(['', 'PUNTOS '+sec.nombre, ...sub]);
    aoa.push([]);
    puntosAoa.push([sec.nombre, ...sub]);
  });
  puntosAoa.push([]);
  puntosAoa.push(['TOTAL', ...acum]);

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), 'PARTIDOS');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(puntosAoa), 'PUNTOS');
  XLSX.writeFile(wb, 'MUNDIAL_2026.xlsx');
}
$('#btnExcel').addEventListener('click', descargarExcel);

/* ---------- arranque ---------- */
function sinConfigurar(){
  return firebaseConfig.apiKey.startsWith('PEGA_AQUI');
}

function arrancarLocal(motivo){
  datos = structuredClone(SEED);
  $('#avisoConfig').style.display = 'block';
  $('#avisoConfig').className = 'aviso-config';
  $('#avisoConfig').innerHTML = motivo;
  estado('Modo local (sin guardar)', false);
  pintarMarcador(); pintarTodo();
}

async function arrancar(){
  if (sinConfigurar()){
    arrancarLocal('⚠️ <strong>Firebase sin configurar.</strong> La porra se ve, pero los cambios no se guardan. '
      + 'Edita el bloque <code>firebaseConfig</code> dentro de <code>index.html</code> con los datos de tu proyecto '
      + '(tienes las instrucciones en el archivo LEEME).');
    return;
  }
  try{
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    refPorra = ref(db, 'porra');

    // Semilla la primera vez (si la base está vacía)
    const snap = await get(refPorra);
    if (!snap.exists()){
      datos = structuredClone(SEED);
      await set(refPorra, datos);
    }

    // Escucha en tiempo real
    onValue(refPorra, (s) => {
      const v = s.val();
      if (!v){ return; }
      // Asegura estructura de arrays (Firebase puede comprimir arrays con huecos)
      datos = v;
      datos.secciones = datos.secciones || [];
      datos.secciones.forEach(sec => {
        sec.partidos = sec.partidos || [];
        sec.partidos.forEach(p => { p.pron = p.pron || ['','','','']; while(p.pron.length<4) p.pron.push(''); });
      });
      if (!$('#contenido').children.length){ pintarMarcador(); pintarTodo(); }
      else refrescar();
      estado('En línea · sincronizado', true);
    }, (err) => {
      toast('Error de conexión: ' + err.message, true);
      estado('Sin conexión', false);
    });
  }catch(e){
    arrancarLocal('⚠️ <strong>No se pudo conectar a Firebase.</strong> Revisa que los datos de '
      + '<code>firebaseConfig</code> sean correctos. Detalle: ' + e.message);
  }
}
arrancar();
</script>
